services:
  - type: web
    name: wei-backend
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: info@wei.or.tz
      - key: ADMIN_EMAIL
        value: admin@wei.or.tz
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://wei.onrender.com
      - key: DB_DRIVER
        value: sqlite
      # MySQL — set DB_DRIVER=mysql and fill these to switch databases
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
    disk:
      name: wei-data
      mountPath: /var/www/html/php
      sizeGB: 1
