services:
  - type: web
    name: wei-backend
    env: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: info@wei.or.tz
      - key: ADMIN_EMAIL
        value: admin@wei.or.tz
      - key: FRONTEND_URL
        value: https://wei.onrender.com
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: wei-data
      mountPath: /opt/render/project/src/server
      sizeGB: 1
